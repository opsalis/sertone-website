<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" style="max-width:880px;width:100%;height:auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00cca0"/>
      <stop offset="100%" stop-color="#009d80"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Glow filter for smart contract -->
    <filter id="contractGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>

  </defs>

  <!-- ===== TOP LABEL: End-to-End Encrypted ===== -->
  <g transform="translate(440, 48)">
    <text x="0" y="0" text-anchor="middle" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="600" letter-spacing="0.05em">END-TO-END ENCRYPTED</text>
  </g>

  <!-- ===== PREMISES RECTANGLES (behind everything) ===== -->

  <!-- Consumer Premises -->
  <rect x="5" y="82" width="328" height="140" rx="14" fill="rgba(148,163,184,0.04)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="169" y="76" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">CONSUMER LAN</text>

  <!-- Owner Premises -->
  <rect x="547" y="82" width="328" height="140" rx="14" fill="rgba(148,163,184,0.04)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="711" y="76" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">OWNER LAN</text>

  <!-- ===== ROW: Data Flow ===== -->

  <!-- Consumer App -->
  <g filter="url(#shadow)">
    <rect x="15" y="130" width="115" height="52" rx="8" fill="url(#darkGrad)"/>
  </g>
  <text x="72" y="155" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="600">Consumer</text>
  <text x="72" y="168" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="600">App</text>

  <!-- Arrow: App → Consumer Handler -->
  <line x1="136" y1="156" x2="168" y2="156" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="168,151 178,156 168,161" fill="#94a3b8"/>

  <!-- Consumer Handler -->
  <g filter="url(#shadow)">
    <rect x="182" y="112" width="140" height="88" rx="10" fill="url(#tealGrad)"/>
  </g>
  <text x="252" y="148" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="700">Consumer</text>
  <text x="252" y="166" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500">Control Center</text>
  <text x="252" y="188" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="9" font-weight="600" letter-spacing="0.15em">SERTONE</text>

  <!-- Encrypted Channel (animated dashes) -->
  <line x1="328" y1="156" x2="552" y2="156" stroke="#00b894" stroke-width="2" stroke-dasharray="10 6" stroke-opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <!-- Second line slightly below for response (opposite direction) -->
  <line x1="328" y1="164" x2="552" y2="164" stroke="#00b894" stroke-width="2" stroke-dasharray="10 6" stroke-opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="-32" to="0" dur="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- Small direction labels on encrypted channel -->
  <text x="440" y="148" text-anchor="middle" fill="#00b894" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="9" font-weight="500" opacity="0.7">request →</text>
  <text x="440" y="181" text-anchor="middle" fill="#00b894" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="9" font-weight="500" opacity="0.7">← response</text>

  <!-- Owner Handler -->
  <g filter="url(#shadow)">
    <rect x="558" y="112" width="140" height="88" rx="10" fill="url(#tealGrad)"/>
  </g>
  <text x="628" y="148" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="700">Owner</text>
  <text x="628" y="166" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500">Control Center</text>
  <text x="628" y="188" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="9" font-weight="600" letter-spacing="0.15em">SERTONE</text>

  <!-- Arrow: Owner Handler → API -->
  <line x1="704" y1="156" x2="736" y2="156" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="736,151 746,156 736,161" fill="#94a3b8"/>

  <!-- Your API -->
  <g filter="url(#shadow)">
    <rect x="750" y="130" width="115" height="52" rx="8" fill="url(#darkGrad)"/>
  </g>
  <text x="807" y="155" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="600">Owner</text>
  <text x="807" y="168" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="600">API</text>

  <!-- ===== SMART CONTRACT (Bottom Center) ===== -->

  <!-- Payment path lines (visible) -->
  <!-- Consumer Handler → Smart Contract -->
  <path d="M252,200 C252,258 345,285 370,318" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Smart Contract → Owner Handler -->
  <path d="M510,318 C535,285 628,258 628,200" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Animated payment dots: Consumer → Contract -->
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M252,200 C252,258 345,285 370,318"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.25s" path="M252,200 C252,258 345,285 370,318"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.5s" repeatCount="indefinite" begin="1.25s"/>
  </circle>

  <!-- Animated payment dots: Contract → Owner -->
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s" path="M510,318 C535,285 628,258 628,200"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="2.05s" path="M510,318 C535,285 628,258 628,200"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.5s" repeatCount="indefinite" begin="2.05s"/>
  </circle>

  <!-- "$" labels on payment dots path -->
  <text x="280" y="248" text-anchor="middle" fill="#3b82f6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="600" opacity="0.5">USDC</text>
  <text x="600" y="248" text-anchor="middle" fill="#3b82f6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="600" opacity="0.5">USDC</text>

  <!-- Smart Contract Box -->
  <g filter="url(#contractGlow)">
    <rect x="335" y="300" width="210" height="52" rx="10" fill="url(#blueGrad)"/>
  </g>
  <!-- Chain icon -->
  <g transform="translate(360, 318)">
    <circle cx="0" cy="0" r="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
    <circle cx="10" cy="0" r="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
    <line x1="4" y1="0" x2="6" y2="0" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
  </g>
  <text x="455" y="322" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700">Smart Contract</text>
  <text x="455" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10.5" font-weight="500">Base L2 · USDC</text>

  <!-- Contract subtle pulse animation -->
  <rect x="335" y="300" width="210" height="52" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1;3;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== BOTTOM LABEL ===== -->
  <text x="440" y="390" text-anchor="middle" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="600" letter-spacing="0.05em">USDC PER-CALL PAYMENT</text>


</svg>
