<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Sertone</title>

    h1 { font-size: 2rem; margin-bottom: 1rem; color: #1e293b; }
    p { color: #64748b; font-size: 1.1rem; margin-bottom: 2rem; }
    a.btn { display: inline-block; padding: 0.65rem 1.5rem; border-radius: 8px; font-weight: 600; background: #00b894; color: #fff; text-decoration: none; }
